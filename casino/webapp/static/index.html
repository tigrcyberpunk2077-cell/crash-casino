<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Crash Casino</title>
<link rel="stylesheet" href="/static/style.css?v=5">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div id="app">

  <!-- Верхняя панель -->
  <header class="topbar">
    <button class="pill pill-referral" id="btnReferral">
      <span class="ico">🔗</span> REFERRAL
    </button>
    <button class="pill pill-music" id="btnMusic">🔊</button>
    <button class="pill pill-balance" id="btnFaucet">
      <span class="coin">⭐</span>
      <span id="balance">0</span>
      <span class="plus">＋</span>
    </button>
  </header>

  <!-- Витрина игр (лобби) -->
  <section class="view" id="view-lobby">
    <div class="lobby-hero"><span>🤠</span> КАЗИНО «ДИКИЙ ЗАПАД»</div>
    <div class="games">
      <div class="gamecard" data-game="crash">
        <div class="gc-art gc-crash"><img src="/static/rocket.png?v=5" alt=""></div>
        <div class="gc-info"><div class="gc-title">CRASH 🚀</div><div class="gc-sub">Успей забрать до краша · до ∞x</div></div>
        <div class="gc-play">Играть</div>
      </div>
      <div class="gamecard" data-game="slot">
        <div class="gc-art gc-slot"><img src="/static/slot/h1.png?v=5" alt=""></div>
        <div class="gc-info"><div class="gc-title">Дикий Запад 🎰</div><div class="gc-sub">Слот · каскады · фриспины · x128</div></div>
        <div class="gc-play">Играть</div>
      </div>
      <div class="gamecard locked">
        <div class="gc-art">🎡</div>
        <div class="gc-info"><div class="gc-title">Рулетка</div><div class="gc-sub">Скоро</div></div>
        <div class="gc-lock">🔒</div>
      </div>
    </div>
  </section>

  <!-- Экран Crash -->
  <section class="view hidden" id="view-crash">
    <div class="stage">
      <canvas id="game"></canvas>
      <div class="mult-wrap">
        <div class="mult" id="mult">x1.00</div>
        <div class="status" id="status">Сделай ставку</div>
      </div>
      <div class="flash" id="flash"></div>
    </div>

    <!-- Лента истории крашей -->
    <div class="history" id="history"></div>

    <!-- Панель ставки -->
    <div class="betpanel">
      <div class="amount-row">
        <button class="step" id="dec">−</button>
        <div class="amount-box">
          <input id="amount" type="text" inputmode="decimal" value="1">
          <span class="cur">tTON</span>
        </div>
        <button class="step" id="inc">＋</button>
      </div>
      <div class="chips" id="chips"></div>
      <button class="action" id="action">Сделать ставку</button>
    </div>

    <!-- Лидерборд -->
    <div class="board">
      <div class="board-title">🏆 Лидеры</div>
      <div id="leaderboard"></div>
    </div>
  </section>

  <!-- Экран Слот -->
  <section class="view hidden" id="view-slot">
    <div class="ladder" id="ladder"></div>
    <div class="slot-frame">
      <div class="slot-grid" id="slotGrid"></div>
      <div class="slot-banner" id="slotBanner"></div>
    </div>
    <div class="slot-bar">
      <div class="slot-bet">
        <button class="sbtn" id="sDec">−</button>
        <div class="sbetbox"><span id="sBet">1</span><small>tTON</small></div>
        <button class="sbtn" id="sInc">＋</button>
      </div>
      <div class="slot-winbox">ВЫИГРЫШ <b><span id="sWin">0.00</span></b></div>
    </div>
    <div class="slot-actions">
      <button class="sact" id="sTurbo"><span>⚡</span>TURBO</button>
      <button class="sact spin" id="sSpin">↻</button>
      <button class="sact" id="sAuto"><span>▶</span>AUTO</button>
      <button class="sbuy" id="sBuy">FEATURE<br>BUY</button>
    </div>
  </section>

  <!-- Экран История -->
  <section class="view hidden" id="view-history">
    <div class="board">
      <div class="board-title">📜 Последние раунды</div>
      <div id="rounds-list" class="rounds-list"></div>
    </div>
  </section>

  <!-- Заглушка для прочих вкладок -->
  <section class="view hidden" id="view-soon">
    <div class="soon">🛠️ Скоро</div>
  </section>

  <!-- Нижняя навигация -->
  <nav class="bottomnav">
    <button class="nav active" data-view="lobby"><span>🏠</span>Лобби</button>
    <button class="nav" data-view="crash"><span>🚀</span>Crash</button>
    <button class="nav" data-view="slot"><span>🎰</span>Слот</button>
    <button class="nav" data-view="history"><span>📜</span>История</button>
  </nav>

  <!-- Тост -->
  <div class="toast" id="toast"></div>

  <!-- Модалка честности -->
  <div class="modal hidden" id="fairModal">
    <div class="modal-card">
      <div class="modal-title">🎲 Проверка честности</div>
      <div class="fair-body" id="fairBody"></div>
      <button class="action small" id="fairClose">Понятно</button>
    </div>
  </div>

</div>
<script src="/static/audio.js?v=5"></script>
<script src="/static/slot.js?v=5"></script>
<script src="/static/app.js?v=5"></script>
</body>
</html>
