<style>
  html,body{margin:0;padding:0;background:#000;height:100%;overflow:hidden;
    font-family:"Courier New",monospace;user-select:none;-webkit-user-select:none;}

<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<script>
"use strict";
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
const W = 960, H = 540;

function fitCanvas(){
  const s = Math.min(innerWidth/W, innerHeight/H);
  cvs.style.width = (W*s)+'px'; cvs.style.height = (H*s)+'px';
}
addEventListener('resize', fitCanvas); fitCanvas();

/* ============================ ЗВУК (синтез) ============================ */
const AU = {
  ctx:null, master:null, started:false,
  fanGain:null, buzzOsc:null, buzzGain:null,
  init(){
    if(this.started) return;
    this.ctx = new (window.AudioContext||window.webkitAudioContext)();
    this.master = this.ctx.createGain(); this.master.gain.value = .8;
    this.master.connect(this.ctx.destination);
    this.started = true;
  },
  noiseBuf(sec){
    const b = this.ctx.createBuffer(1, this.ctx.sampleRate*sec, this.ctx.sampleRate);
    const d = b.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
    return b;
  },
  startAmbience(){
    if(!this.started || this.fanGain) return;
    // гул вентилятора: фильтрованный шум
    const src = this.ctx.createBufferSource();
    src.buffer = this.noiseBuf(2); src.loop = true;
    const f = this.ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 220;
    this.fanGain = this.ctx.createGain(); this.fanGain.gain.value = .06;
    src.connect(f); f.connect(this.fanGain); this.fanGain.connect(this.master);
    src.start();
    // низкий гул здания
    const o = this.ctx.createOscillator(); o.type='sine'; o.frequency.value = 52;
    const og = this.ctx.createGain(); og.gain.value = .03;
    o.connect(og); og.connect(this.master); o.start();
  },
  stopAmbience(){
    if(this.fanGain){ this.fanGain.gain.value = 0; }
  },
  blip(){
    if(!this.started) return;
    const t = this.ctx.currentTime;
    const src = this.ctx.createBufferSource(); src.buffer = this.noiseBuf(.15);
    const f = this.ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value = 1200;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(.35,t); g.gain.exponentialRampToValueAtTime(.001,t+.14);
    src.connect(f); f.connect(g); g.connect(this.master); src.start();
  },
  doorSlam(){
    if(!this.started) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(); o.type='square'; o.frequency.setValueAtTime(90,t);
    o.frequency.exponentialRampToValueAtTime(35,t+.18);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(.5,t); g.gain.exponentialRampToValueAtTime(.001,t+.25);
    o.connect(g); g.connect(this.master); o.start(); o.stop(t+.3);
    const src = this.ctx.createBufferSource(); src.buffer = this.noiseBuf(.2);
    const f = this.ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 500;
    const g2 = this.ctx.createGain();
    g2.gain.setValueAtTime(.4,t); g2.gain.exponentialRampToValueAtTime(.001,t+.2);
    src.connect(f); f.connect(g2); g2.connect(this.master); src.start();
  },
  click(){
    if(!this.started) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(); o.type='square'; o.frequency.value = 900;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(.15,t); g.gain.exponentialRampToValueAtTime(.001,t+.05);
    o.connect(g); g.connect(this.master); o.start(); o.stop(t+.06);
  },
  knock(){
    if(!this.started) return;
    for(let i=0;i<3;i++){
      const t = this.ctx.currentTime + i*.25;
      const o = this.ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(70,t);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(.7,t); g.gain.exponentialRampToValueAtTime(.001,t+.18);
      o.connect(g); g.connect(this.master); o.start(t); o.stop(t+.2);
    }
  },
  steps(){
    if(!this.started) return;
    for(let i=0;i<6;i++){
      const t = this.ctx.currentTime + i*.18;
      const src = this.ctx.createBufferSource(); src.buffer = this.noiseBuf(.08);
      const f = this.ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 300;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(.5,t); g.gain.exponentialRampToValueAtTime(.001,t+.09);
      src.connect(f); f.connect(g); g.connect(this.master); src.start(t);
    }
  },
  pots(){
    if(!this.started) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(); o.type='triangle';
    o.frequency.setValueAtTime(500+Math.random()*700,t);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(.12,t); g.gain.exponentialRampToValueAtTime(.001,t+.3);
    o.connect(g); g.connect(this.master); o.start(); o.stop(t+.35);
  },
  scream(){
    if(!this.started) return;
    const t = this.ctx.currentTime;
    const src = this.ctx.createBufferSource(); src.buffer = this.noiseBuf(1.2);
    const f = this.ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1400; f.Q.value=.6;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(.9,t); g.gain.setValueAtTime(.9,t+.9);
    g.gain.exponentialRampToValueAtTime(.001,t+1.2);
    src.connect(f); f.connect(g); g.connect(this.master); src.start();
    const o = this.ctx.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(700,t); o.frequency.linearRampToValueAtTime(250,t+1);
    const og = this.ctx.createGain();
    og.gain.setValueAtTime(.5,t); og.gain.exponentialRampToValueAtTime(.001,t+1.1);
    o.connect(og); og.connect(this.master); o.start(); o.stop(t+1.2);
  },
  chime(){
    if(!this.started) return;
    const notes = [523,659,784,1047,784,1047];
    notes.forEach((f,i)=>{
      const t = this.ctx.currentTime + i*.35;
      const o = this.ctx.createOscillator(); o.type='sine'; o.frequency.value = f;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(.3,t); g.gain.exponentialRampToValueAtTime(.001,t+.8);
      o.connect(g); g.connect(this.master); o.start(t); o.stop(t+.85);
    });
  },
  musicBox(){
    if(!this.started) return;
    const mel = [392,330,262,330,392,523,440,392,330,294,262];
    mel.forEach((f,i)=>{
      const t = this.ctx.currentTime + i*.55;
      const o = this.ctx.createOscillator(); o.type='sine'; o.frequency.value = f;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(.18,t); g.gain.exponentialRampToValueAtTime(.001,t+.9);
      o.connect(g); g.connect(this.master); o.start(t); o.stop(t+1);
    });
  }
};

/* ============================ ДАННЫЕ ============================ */
const ROOMS = {
  stage:    {name:'СЦЕНА',          cam:'CAM 1A', mx:170, my:60},
  dining:   {name:'ЗАЛ',            cam:'CAM 1B', mx:160, my:135},
  cove:     {name:'УГОЛ ЛИСА',      cam:'CAM 1C', mx:90,  my:200},
  west:     {name:'ЗАП. КОРИДОР',   cam:'CAM 2A', mx:115, my:265},
  wcorner:  {name:'ЗАП. УГОЛ',      cam:'CAM 2B', mx:115, my:330},
  backstage:{name:'ПОДСОБКА',       cam:'CAM 3',  mx:55,  my:110},
  east:     {name:'ВОСТ. КОРИДОР',  cam:'CAM 4A', mx:225, my:265},
  ecorner:  {name:'ВОСТ. УГОЛ',     cam:'CAM 4B', mx:225, my:330},
  kitchen:  {name:'КУХНЯ',          cam:'CAM 5',  mx:255, my:180},
  toilets:  {name:'ТУАЛЕТЫ',        cam:'CAM 6',  mx:300, my:110},
};
const CAM_ORDER = ['stage','dining','cove','west','wcorner','backstage','east','ecorner','kitchen','toilets'];

// Аниматроники (оригинальные персонажи): Мишка, Зайка, Утя, Лис
const ANIM_DEF = {
  bear:  {name:'МИШКА', color:'#6b4a2b', dark:'#3d2a17', accent:'#caa05a', door:'right',
          interval:5.1, path:{stage:'dining', dining:'toilets', toilets:'kitchen', kitchen:'east', east:'ecorner'}},
  rabbit:{name:'ЗАЙКА', color:'#4a4a8f', dark:'#2a2a55', accent:'#9a9ad6', door:'left',
          interval:4.9, path:{stage:'dining', dining:'backstage', backstage:'west', west:'wcorner'}},
  duck:  {name:'УТЯ',   color:'#b8a23a', dark:'#6e6020', accent:'#e8d56a', door:'right',
          interval:4.95, path:{stage:'dining', dining:'kitchen', kitchen:'east', east:'ecorner'}},
  fox:   {name:'ЛИС',   color:'#8f3b2b', dark:'#54221a', accent:'#d6754f', door:'left',
          interval:5.05, path:{}},
};
// Уровни ИИ по ночам [мишка, зайка, утя, лис]
const AI_LEVELS = {
  1:[0,0,0,0], 2:[0,3,1,1], 3:[1,0,5,2], 4:[2,4,6,6], 5:[3,7,9,8], 6:[4,12,12,16]
};
const HOUR_LEN = 55;       // секунд на игровой час
const NIGHT_HOURS = 6;
const SCENE_W = 1440;      // ширина сцены офиса

/* ============================ СОСТОЯНИЕ ============================ */
let scene = 'menu';        // menu | night | jumpscare | gameover | win | beat6
let frame = 0, lastT = 0;
let mouse = {x:W/2, y:H/2, down:false};
let unlockedNight = parseInt(localStorage.getItem('fnp_night')||'1');
if(!(unlockedNight>=1 && unlockedNight<=6)) unlockedNight = 1;

let G = null; // состояние текущей ночи

function newNight(n){
  const ai = AI_LEVELS[Math.min(n,6)];
  G = {
    night:n, time:0, power:100, usage:1,
    doorL:false, doorR:false, lightL:false, lightR:false,
    camUp:false, cam:'stage', camStatic:1,
    panX:(SCENE_W-W)/2,
    anims:{
      bear:  {room:'stage', ai:ai[0], timer:ANIM_DEF.bear.interval,  inOffice:0},
      rabbit:{room:'stage', ai:ai[1], timer:ANIM_DEF.rabbit.interval,inOffice:0},
      duck:  {room:'stage', ai:ai[2], timer:ANIM_DEF.duck.interval,  inOffice:0},
      fox:   {room:'cove',  ai:ai[3], timer:ANIM_DEF.fox.interval,   phase:0, running:0, knocks:0},
    },
    powerOut:false, poTimer:0, poEyes:false,
    killer:null, jsTimer:0,
    winTimer:0, msg:'', msgT:0,
    shake:0,
  };
}

/* ============================ ЛОГИКА ============================ */
function animAtDoor(side){
  for(const k of ['bear','rabbit','duck']){
    const a = G.anims[k];
    const corner = ANIM_DEF[k].door==='left' ? 'wcorner':'ecorner';
    if(ANIM_DEF[k].door===side && a.room===corner) return k;
  }
  return null;
}
function roomOccupied(room, except){
  for(const k of ['bear','rabbit','duck'])
    if(k!==except && G.anims[k].room===room) return true;
  return false;
}

function tryMove(k){
  const a = G.anims[k], def = ANIM_DEF[k];
  if(a.inOffice) return;
  if(Math.ceil(Math.random()*20) > a.ai) return; // бросок против уровня ИИ

  if(k==='fox'){
    // Лис: копит фазы, пока на него не смотрят
    if(G.camUp && G.cam==='cove') return;
    if(a.phase<3){ a.phase++; }
    else if(!a.running){
      a.running = 2.0; AU.steps();
    }
    return;
  }
  // Мишка не двигается, пока смотрят его камеру
  if(k==='bear' && G.camUp && G.cam===a.room) return;

  const corner = def.door==='left' ? 'wcorner':'ecorner';
  if(a.room===corner){
    // у двери: закрыта — уходит, открыта — заходит в офис
    if((def.door==='left' && G.doorL) || (def.door==='right' && G.doorR)){
      a.room = 'dining';
    } else {
      a.inOffice = 4 + Math.random()*7;
      a.room = 'office';
      AU.steps();
    }
    return;
  }
  let next = def.path[a.room];
  if(!next) return;
  if(roomOccupied(next,k)) return; // место занято — ждём
  a.room = next;
  if(next==='kitchen') AU.pots();
}

function updateNight(dt){
  if(G.killer){ // идёт скример
    G.jsTimer -= dt;
    G.shake = 14;
    if(G.jsTimer<=0){ scene='gameover'; }
    return;
  }
  G.time += dt;
  // 6 утра
  if(G.time >= HOUR_LEN*NIGHT_HOURS){
    AU.stopAmbience(); AU.chime();
    if(G.night>=unlockedNight && G.night<6){
      unlockedNight = G.night+1;
      localStorage.setItem('fnp_night', String(unlockedNight));
    }
    scene = (G.night>=6) ? 'beat6' : 'win';
    return;
  }

  if(!G.powerOut){
    // энергия
    G.usage = 1 + (G.doorL?1:0) + (G.doorR?1:0) + ((G.lightL||G.lightR)?1:0) + (G.camUp?1:0);
    G.power -= G.usage * 0.022 * dt * (1 + G.night*0.03);
    if(G.power<=0){
      G.power = 0; G.powerOut = true; G.poTimer = 0;
      G.doorL = G.doorR = G.lightL = G.lightR = G.camUp = false;
      AU.stopAmbience(); AU.doorSlam();
      setTimeout(()=>AU.musicBox(), 1500);
    }
    // ИИ
    for(const k of ['bear','rabbit','duck','fox']){
      const a = G.anims[k];
      if(a.inOffice){
        a.inOffice -= dt;
        if(a.inOffice<=0) startJumpscare(k);
        continue;
      }
      a.timer -= dt;
      if(a.timer<=0){ a.timer = ANIM_DEF[k].interval; tryMove(k); }
    }
    // бег Лиса
    const fx = G.anims.fox;
    if(fx.running>0){
      fx.running -= dt;
      if(fx.running<=0){
        if(G.doorL){
          AU.knock();
          G.power = Math.max(0, G.power - (3 + fx.knocks*4));
          fx.knocks++; fx.phase = 0; fx.running = 0;
          G.shake = 10;
          setMsg('Стук в левую дверь!');
        } else {
          startJumpscare('fox');
        }
      }
    }
  } else {
    // отключение питания
    G.poTimer += dt;
    if(G.poTimer>3) G.poEyes = true;
    if(G.poTimer > 9 + Math.random()*8) startJumpscare('bear');
  }

  G.camStatic = Math.max(0, G.camStatic - dt*3);
  if(G.shake>0) G.shake = Math.max(0, G.shake - dt*40);
  if(G.msgT>0) G.msgT -= dt;

  // панорама офиса мышью
  if(!G.camUp){
    const edge = 200;
    if(mouse.x < edge) G.panX -= (1-mouse.x/edge) * 420 * dt;
    if(mouse.x > W-edge) G.panX += (1-(W-mouse.x)/edge) * 420 * dt;
    G.panX = Math.max(0, Math.min(SCENE_W-W, G.panX));
  }
}

function startJumpscare(k){
  if(G.killer) return;
  G.killer = k; G.jsTimer = 1.5;
  AU.scream();
}
function setMsg(s){ G.msg = s; G.msgT = 3; }

/* ============================ РИСОВАНИЕ: ПЕРСОНАЖИ ============================ */
function drawAnimatronic(c, k, x, y, s, opts={}){
  const d = ANIM_DEF[k];
  const ag = opts.aggressive||0;
  c.save(); c.translate(x,y); c.scale(s,s);
  if(opts.sil){ // силуэт
    c.fillStyle = '#05050a';
  }
  // тело
  c.fillStyle = opts.sil ? '#08080f' : d.dark;
  c.beginPath(); c.ellipse(0,58,30,38,0,0,Math.PI*2); c.fill();
  // живот
  if(!opts.sil){
    c.fillStyle = d.accent;
    c.beginPath(); c.ellipse(0,60,18,26,0,0,Math.PI*2); c.fill();
  }
  // руки
  c.fillStyle = opts.sil ? '#08080f' : d.dark;
  c.beginPath(); c.ellipse(-32,52,9,30,.3,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(32,52,9,30,-.3,0,Math.PI*2); c.fill();
  // голова
  c.fillStyle = opts.sil ? '#08080f' : d.color;
  c.beginPath(); c.ellipse(0,0,26,24,0,0,Math.PI*2); c.fill();
  // уши
  if(k==='rabbit'){
    c.beginPath(); c.ellipse(-12,-34,6,20,-.15,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(12,-34,6,20,.15,0,Math.PI*2); c.fill();
  } else if(k==='bear'){
    c.beginPath(); c.arc(-18,-18,8,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(18,-18,8,0,Math.PI*2); c.fill();
  } else if(k==='fox'){
    c.beginPath(); c.moveTo(-22,-12); c.lineTo(-14,-34); c.lineTo(-6,-14); c.fill();
    c.beginPath(); c.moveTo(22,-12); c.lineTo(14,-34); c.lineTo(6,-14); c.fill();
  } else if(k==='duck'){
    // хохолок
    c.beginPath(); c.moveTo(-4,-22); c.quadraticCurveTo(0,-36,6,-24); c.fill();
  }
  // морда
  if(!opts.sil){
    c.fillStyle = d.accent;
    if(k==='duck'){
      c.fillStyle = '#d97f28';
      c.beginPath(); c.ellipse(0,8,12,7+(ag?4:0),0,0,Math.PI*2); c.fill();
    } else {
      c.beginPath(); c.ellipse(0,8,11,9,0,0,Math.PI*2); c.fill();
      c.fillStyle = '#1a1a1a';
      c.beginPath(); c.ellipse(0,5,4,3,0,0,Math.PI*2); c.fill();
    }
    // рот
    if(ag){
      c.fillStyle = '#1a0505';
      c.beginPath(); c.ellipse(0,14,9,6,0,0,Math.PI*2); c.fill();
      c.fillStyle = '#ddd';
      for(let i=-2;i<=2;i++){ c.fillRect(i*4-1,9,2,3); c.fillRect(i*4-1,17,2,3); }
    }
  }
  // глаза — всегда светятся
  const eg = opts.eyeGlow!==false;
  c.fillStyle = opts.sil||eg ? (ag? '#ff2222':'#e8e8ff') : '#222';
  if(eg){ c.shadowColor = ag? '#f00':'#aaf'; c.shadowBlur = 12; }
  c.beginPath(); c.arc(-9,-4,3.6,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(9,-4,3.6,0,Math.PI*2); c.fill();
  c.shadowBlur = 0;
  if(!opts.sil && !ag){
    c.fillStyle = '#111';
    c.beginPath(); c.arc(-9,-4,1.5,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(9,-4,1.5,0,Math.PI*2); c.fill();
  }
  c.restore();
}

function drawJumpscareFace(c, k, t){
  const d = ANIM_DEF[k];
  const z = 1 + (1.5-t)*2.2;
  c.save();
  c.translate(W/2 + (Math.random()-.5)*30, H/2 + (Math.random()-.5)*30);
  c.scale(z*3.2, z*3.2);
  // голова крупно
  c.fillStyle = d.color;
  c.beginPath(); c.ellipse(0,0,30,28,0,0,Math.PI*2); c.fill();
  if(k==='rabbit'){
    c.beginPath(); c.ellipse(-13,-38,7,22,-.15,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(13,-38,7,22,.15,0,Math.PI*2); c.fill();
  } else if(k==='bear'){
    c.beginPath(); c.arc(-20,-20,9,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(20,-20,9,0,Math.PI*2); c.fill();
  } else if(k==='fox'){
    c.beginPath(); c.moveTo(-26,-14); c.lineTo(-16,-40); c.lineTo(-6,-16); c.fill();
    c.beginPath(); c.moveTo(26,-14); c.lineTo(16,-40); c.lineTo(6,-16); c.fill();
  }
  // пасть
  c.fillStyle = '#1a0505';
  c.beginPath(); c.ellipse(0,14,16,11,0,0,Math.PI*2); c.fill();
  c.fillStyle = '#eee';
  for(let i=-3;i<=3;i++){ c.fillRect(i*4.5-1.5,5,3,5); c.fillRect(i*4.5-1.5,20,3,5); }
  // глаза
  c.fillStyle = '#ff2020'; c.shadowColor='#f00'; c.shadowBlur=20;
  c.beginPath(); c.arc(-11,-6,5,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(11,-6,5,0,Math.PI*2); c.fill();
  c.shadowBlur=0;
  c.restore();
}

/* ============================ РИСОВАНИЕ: ОФИС ============================ */
function drawOffice(){
  const px = -G.panX;
  const pwr = !G.powerOut;
  ctx.save();
  if(G.shake>0) ctx.translate((Math.random()-.5)*G.shake, (Math.random()-.5)*G.shake);
  ctx.translate(px,0);

  // фон-стены
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, pwr?'#14121c':'#030305');
  g.addColorStop(1, pwr?'#0a0911':'#010102');
  ctx.fillStyle = g; ctx.fillRect(0,0,SCENE_W,H);
  // пол
  ctx.fillStyle = pwr?'#191625':'#040406'; ctx.fillRect(0,400,SCENE_W,140);
  ctx.strokeStyle = pwr?'#23203a':'#0a0a10'; ctx.lineWidth=2;
  for(let i=0;i<24;i++){
    ctx.beginPath();
    ctx.moveTo(i*70-200, 540); ctx.lineTo(i*70+60-200, 400); ctx.stroke();
  }
  // плинтус с полосой
  ctx.fillStyle = pwr?'#2a2444':'#0a0814'; ctx.fillRect(0,388,SCENE_W,14);

  // ===== Левая дверь =====
  drawDoorway('left', 60, pwr);
  // ===== Правая дверь =====
  drawDoorway('right', SCENE_W-260, pwr);

  // ===== Стол по центру =====
  const dx = SCENE_W/2;
  // плакаты
  drawPoster(dx-310, 110, '#5a4a2a', 'ПИЦЦА!');
  drawPoster(dx+230, 105, '#2a4a5a', 'ПРАЗДНИК');
  drawPosterKids(dx-90, 90);
  // стол
  ctx.fillStyle = pwr?'#2e2840':'#0b0a12';
  ctx.fillRect(dx-220, 350, 440, 22);
  ctx.fillStyle = pwr?'#221d31':'#08070e';
  ctx.fillRect(dx-200, 372, 24, 110); ctx.fillRect(dx+176, 372, 24, 110);
  // мониторы
  ctx.fillStyle = '#111'; ctx.fillRect(dx-150, 280, 100, 72);
  ctx.fillStyle = pwr ? (G.camUp?'#0a2a10':'#08101e') : '#020203';
  ctx.fillRect(dx-145, 285, 90, 60);
  if(pwr){
    ctx.fillStyle = '#1c4a6e';
    for(let i=0;i<4;i++) ctx.fillRect(dx-140, 290+i*13, 40+Math.sin(frame*.05+i)*20+20, 4);
  }
  // вентилятор (анимированный)
  ctx.save(); ctx.translate(dx+90, 305);
  ctx.fillStyle = pwr?'#3a3450':'#0c0b14'; ctx.fillRect(-6, 18, 12, 30);
  ctx.fillRect(-26, 44, 52, 8);
  ctx.beginPath(); ctx.arc(0,0,34,0,Math.PI*2);
  ctx.strokeStyle = pwr?'#4a4468':'#11101c'; ctx.lineWidth=4; ctx.stroke();
  if(pwr){
    ctx.rotate(frame*.45);
    ctx.fillStyle = '#888';
    for(let i=0;i<3;i++){ ctx.rotate(Math.PI*2/3);
      ctx.beginPath(); ctx.ellipse(0,-17,7,17,0,0,Math.PI*2); ctx.fill(); }
  }
  ctx.restore();
  // кружка и бумаги
  ctx.fillStyle = pwr?'#6e3a3a':'#140b0b'; ctx.fillRect(dx-15, 330, 18, 20);
  ctx.fillStyle = pwr?'#3c3c50':'#0d0d14';
  ctx.fillRect(dx+20, 338, 46, 12); ctx.fillRect(dx+30, 332, 46, 8);

  // потолочная лампа над столом
  if(pwr){
    const flick = Math.random()<.02 ? .3 : 1;
    const lg = ctx.createRadialGradient(dx,60,10,dx,60,420);
    lg.addColorStop(0,`rgba(255,240,200,${.16*flick})`);
    lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = lg; ctx.fillRect(dx-450,0,900,540);
  }

  // светящиеся глаза в темноте при отключении
  if(G.powerOut && G.poEyes){
    const ex = 130;
    ctx.fillStyle = '#dfe3ff'; ctx.shadowColor='#aaf'; ctx.shadowBlur=16;
    const blink = Math.floor(frame/40)%7===0;
    if(!blink){
      ctx.beginPath(); ctx.arc(ex-12, 250, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex+12, 250, 5, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;
  }
  ctx.restore();

  // виньетка
  const vg = ctx.createRadialGradient(W/2,H/2,200,W/2,H/2,620);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.75)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
}

function drawDoorway(side, x, pwr){
  const left = side==='left';
  const closed = left ? G.doorL : G.doorR;
  const lightOn = pwr && (left ? G.lightL : G.lightR);
  const who = animAtDoor(side);
  // проём
  ctx.fillStyle = '#000';
  ctx.fillRect(x, 95, 200, 305);
  // свет в проёме
  if(lightOn){
    const flick = Math.random()<.1 ? .5 : 1;
    const lg = ctx.createLinearGradient(x,95,x,400);
    lg.addColorStop(0,`rgba(200,210,255,${.30*flick})`);
    lg.addColorStop(1,`rgba(200,210,255,${.08*flick})`);
    ctx.fillStyle = lg; ctx.fillRect(x,95,200,305);
    if(who && !closed){
      drawAnimatronic(ctx, who, x+100, 230, 1.5, {aggressive:1});
    }
  }
  // дверь (металлическая, опускается)
  if(closed){
    const dg = ctx.createLinearGradient(x,0,x+200,0);
    dg.addColorStop(0,'#2e2e3c'); dg.addColorStop(.5,'#4a4a5e'); dg.addColorStop(1,'#26262f');
    ctx.fillStyle = dg; ctx.fillRect(x,95,200,305);
    ctx.strokeStyle = '#15151c'; ctx.lineWidth=3;
    for(let i=1;i<6;i++){ ctx.beginPath(); ctx.moveTo(x,95+i*50); ctx.lineTo(x+200,95+i*50); ctx.stroke(); }
  }
  // рама
  ctx.fillStyle = pwr?'#332d4d':'#0c0b14';
  ctx.fillRect(x-18, 80, 18, 330); ctx.fillRect(x+200, 80, 18, 330);
  ctx.fillRect(x-18, 80, 236, 18);
  // кнопки
  const bx = left ? x+226 : x-66;
  drawButton(bx, 200, closed, 'ДВЕРЬ', pwr);
  drawButton(bx, 268, lightOn, 'СВЕТ', pwr);
}
function drawButton(x, y, active, label, pwr){
  ctx.fillStyle = pwr?'#1d1a2c':'#0a0911';
  ctx.fillRect(x-6, y-10, 52, 56);
  ctx.fillStyle = active ? (pwr?'#3adb5a':'#123') : (pwr?'#c0392b':'#311');
  ctx.beginPath(); ctx.arc(x+20, y+8, 14, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth=3; ctx.stroke();
  ctx.fillStyle = pwr?'#8a84a8':'#2a2738';
  ctx.font = '10px "Courier New"'; ctx.textAlign='center';
  ctx.fillText(label, x+20, y+38);
}
function drawPoster(x, y, col, txt){
  ctx.fillStyle = col; ctx.fillRect(x, y, 80, 100);
  ctx.fillStyle = 'rgba(255,255,255,.12)'; ctx.fillRect(x+8, y+10, 64, 50);
  ctx.fillStyle = '#ddd'; ctx.font='10px "Courier New"'; ctx.textAlign='center';
  ctx.fillText(txt, x+40, y+82);
}
function drawPosterKids(x, y){
  ctx.fillStyle = '#3a3328'; ctx.fillRect(x, y, 180, 120);
  ctx.fillStyle = '#2a2418'; ctx.fillRect(x+6, y+6, 168, 108);
  // три головы персонажей
  const cols = ['#6b4a2b','#4a4a8f','#b8a23a'];
  cols.forEach((c0,i)=>{
    ctx.fillStyle = c0;
    ctx.beginPath(); ctx.arc(x+45+i*45, y+55, 20, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#dcd6c0';
    ctx.beginPath(); ctx.arc(x+38+i*45, y+50, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+52+i*45, y+50, 3, 0, Math.PI*2); ctx.fill();
  });
  ctx.fillStyle = '#cbbf9a'; ctx.font='11px "Courier New"'; ctx.textAlign='center';
  ctx.fillText('ВЕСЁЛАЯ ПИЦЦЕРИЯ', x+90, y+105);
}

/* ============================ РИСОВАНИЕ: КАМЕРЫ ============================ */
function whoInRoom(room){
  const list = [];
  for(const k of ['bear','rabbit','duck']) if(G.anims[k].room===room) list.push(k);
  if(room==='cove') list.push('fox');
  return list;
}

function drawCamView(){
  const room = G.cam;
  // фон комнаты
  ctx.fillStyle = '#0a0f0a'; ctx.fillRect(0,0,W,H);
  ctx.save();
  // лёгкое дрожание камеры
  ctx.translate(Math.sin(frame*.07)*2, 0);

  if(room==='kitchen'){
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#3adb5a'; ctx.font='28px "Courier New"'; ctx.textAlign='center';
    ctx.fillText('— КАМЕРА ОТКЛЮЧЕНА —', W/2, H/2-20);
    ctx.font='18px "Courier New"';
    ctx.fillText('ТОЛЬКО АУДИО', W/2, H/2+20);
    if(whoInRoom('kitchen').length && Math.random()<.01) AU.pots();
    ctx.restore();
    drawCamOverlay(); return;
  }

  // общий интерьер
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#11160f'); g.addColorStop(1,'#070a06');
  ctx.fillStyle = g; ctx.fillRect(-10,0,W+20,H);
  ctx.fillStyle = '#0d120b'; ctx.fillRect(-10,380,W+20,160);
  ctx.strokeStyle = '#1a2415'; ctx.lineWidth=2;
  for(let i=0;i<16;i++){ ctx.beginPath(); ctx.moveTo(i*70-30,540); ctx.lineTo(i*70+40-30,380); ctx.stroke(); }

  const inhab = whoInRoom(room);
  if(room==='stage'){
    // сцена с занавесом
    ctx.fillStyle = '#1c1420'; ctx.fillRect(80,120,800,260);
    ctx.fillStyle = '#3d1525';
    for(let i=0;i<10;i++){ ctx.beginPath();
      ctx.ellipse(120+i*82,120,40,250,0,0,Math.PI); ctx.fill(); }
    ctx.fillStyle = '#241a2c'; ctx.fillRect(60,370,840,30);
    // персонажи на сцене (кто ещё не ушёл)
    let i0 = 0;
    for(const k of inhab){ drawAnimatronic(ctx, k, 330+i0*150, 280, 1.4); i0++; }
    if(!inhab.length){
      ctx.fillStyle='#3a4a3a'; ctx.font='16px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('СЦЕНА ПУСТА', W/2, 260);
    }
  } else if(room==='dining'){
    // столы с колпаками
    for(let i=0;i<3;i++){
      ctx.fillStyle = '#241f33'; ctx.fillRect(120+i*270, 330, 200, 16);
      ctx.fillStyle = '#1a1626'; ctx.fillRect(200+i*270, 346, 30, 60);
      for(let j=0;j<4;j++){
        ctx.fillStyle = ['#7a4a8a','#4a7a5a','#8a7a3a','#5a5a9a'][j];
        ctx.beginPath(); ctx.moveTo(140+i*270+j*42, 330);
        ctx.lineTo(152+i*270+j*42, 300); ctx.lineTo(164+i*270+j*42, 330); ctx.fill();
      }
    }
    let i1 = 0;
    for(const k of inhab){ drawAnimatronic(ctx, k, 250+i1*230, 250, 1.3, {aggressive: G.night>2?1:0}); i1++; }
  } else if(room==='cove'){
    // занавес угла
    ctx.fillStyle = '#1a1024'; ctx.fillRect(200,110,560,280);
    ctx.fillStyle = '#43163a';
    for(let i=0;i<7;i++){ ctx.beginPath();
      ctx.ellipse(240+i*82,110,42,270,0,0,Math.PI); ctx.fill(); }
    const ph = G.anims.fox.phase;
    if(ph===0){
      ctx.fillStyle = '#0c0814'; ctx.fillRect(420,170,140,220); // щель
    } else {
      ctx.fillStyle = '#0c0814'; ctx.fillRect(380,150,220,240);
      if(ph===1){ // выглядывает
        drawAnimatronic(ctx, 'fox', 470, 300, 1.2, {eyeGlow:true});
      } else if(ph===2){
        drawAnimatronic(ctx, 'fox', 480, 280, 1.45, {aggressive:1});
      } else {
        ctx.fillStyle='#3a2a2a'; ctx.font='18px "Courier New"'; ctx.textAlign='center';
        ctx.fillText('ЕГО НЕТ...', 480, 280);
      }
    }
    ctx.fillStyle = '#8a7a5a'; ctx.font='14px "Courier New"'; ctx.textAlign='center';
    ctx.fillText('«НЕ ЗАГЛЯДЫВАТЬ»', 480, 430);
  } else if(room==='west' || room==='east'){
    // коридор в перспективе
    ctx.fillStyle = '#0e1310';
    ctx.beginPath(); ctx.moveTo(250,80); ctx.lineTo(710,80); ctx.lineTo(620,420); ctx.lineTo(340,420); ctx.fill();
    ctx.strokeStyle = '#1f2a1f'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(250,80); ctx.lineTo(340,420); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(710,80); ctx.lineTo(620,420); ctx.stroke();
    drawPoster(120, 150, '#3a3a2a','ПРАВИЛА');
    drawPoster(760, 150, '#2a3a3a','МЕНЮ');
    let i2 = 0;
    for(const k of inhab){ drawAnimatronic(ctx, k, 440+i2*120, 290, 1.5, {aggressive:1}); i2++; }
    if(room==='west' && G.anims.fox.running>0){
      drawAnimatronic(ctx, 'fox', 480 - (2-G.anims.fox.running)*180, 300, 1.7, {aggressive:1});
    }
  } else if(room==='wcorner' || room==='ecorner'){
    ctx.fillStyle = '#0c100c'; ctx.fillRect(150,60,660,340);
    drawPosterKids(560, 100);
    drawPoster(220, 110, '#4a3a2a','ЗВЕЗДА');
    let i3 = 0;
    for(const k of inhab){
      drawAnimatronic(ctx, k, 400+i3*160, 270, 1.9, {aggressive:1});
      i3++;
    }
  } else if(room==='backstage'){
    // полки с запасными головами
    ctx.fillStyle = '#16131f'; ctx.fillRect(100,100,760,300);
    ctx.fillStyle = '#241f33'; ctx.fillRect(120,180,300,12); ctx.fillRect(120,280,300,12);
    for(let i=0;i<4;i++){
      ctx.fillStyle = ['#5a4a3a','#3a3a6a','#8a7a3a','#6a3a2a'][i];
      ctx.beginPath(); ctx.arc(170+i*70, 160, 24, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath(); ctx.arc(162+i*70,155,5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(178+i*70,155,5,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#1d1830'; ctx.fillRect(550,250,240,16); // стол
    let i4 = 0;
    for(const k of inhab){ drawAnimatronic(ctx, k, 600+i4*130, 280, 1.5, {aggressive:1}); i4++; }
  } else if(room==='toilets'){
    ctx.fillStyle = '#13181c'; ctx.fillRect(100,90,760,310);
    for(let i=0;i<5;i++){ ctx.fillStyle = '#1f2830'; ctx.fillRect(150+i*140, 130, 90, 200);
      ctx.fillStyle = '#0d1217'; ctx.fillRect(160+i*140, 145, 70, 170); }
    let i5 = 0;
    for(const k of inhab){ drawAnimatronic(ctx, k, 320+i5*200, 290, 1.4, {aggressive:1, eyeGlow:true}); i5++; }
  }
  ctx.restore();
  drawCamOverlay();
}

function drawCamOverlay(){
  // зелёный тон + сканлайны + шум
  ctx.fillStyle = 'rgba(40,255,80,.045)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = 'rgba(0,0,0,.18)';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,2);
  drawStatic(.10 + G.camStatic*.8);
  // рамка и подписи
  ctx.strokeStyle = 'rgba(180,255,180,.35)'; ctx.lineWidth=2;
  ctx.strokeRect(10,10,W-20,H-20);
  ctx.fillStyle = '#c8ffc8'; ctx.font='20px "Courier New"'; ctx.textAlign='left';
  ctx.fillText(ROOMS[G.cam].cam + ' · ' + ROOMS[G.cam].name, 30, 42);
  if(Math.floor(frame/0.5/30)%2===0){
    ctx.fillStyle = '#ff4040';
    ctx.beginPath(); ctx.arc(38, 68, 8, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = '#c8ffc8'; ctx.textAlign='left';
  ctx.fillText('REC', 56, 75);
  drawCamMap();
}

function drawCamMap(){
  const mx0 = W-360, my0 = H-330;
  ctx.fillStyle = 'rgba(5,12,5,.85)';
  ctx.fillRect(mx0, my0, 340, 290);
  ctx.strokeStyle = '#2a4a2a'; ctx.strokeRect(mx0, my0, 340, 290);
  // схема-связи
  ctx.strokeStyle = '#1c3a1c'; ctx.lineWidth=2;
  ctx.strokeRect(mx0+90, my0+30, 180, 60);   // сцена/зал зона
  ctx.beginPath();
  ctx.moveTo(mx0+115,my0+255+12); ctx.lineTo(mx0+115,my0+135); ctx.moveTo(mx0+225,my0+255+12); ctx.lineTo(mx0+225,my0+135);
  ctx.stroke();
  // офис
  ctx.fillStyle = '#3a5a3a'; ctx.fillRect(mx0+150, my0+255, 40, 26);
  ctx.fillStyle = '#9fdf9f'; ctx.font='10px "Courier New"'; ctx.textAlign='center';
  ctx.fillText('ВЫ', mx0+170, my0+271);
  // кнопки камер
  for(const key of CAM_ORDER){
    const r = ROOMS[key];
    const bx = mx0 + r.mx - 40, by = my0 + r.my - 40;
    const sel = G.cam===key;
    ctx.fillStyle = sel ? '#3adb5a' : 'rgba(30,60,30,.9)';
    ctx.fillRect(bx, by, 64, 26);
    ctx.strokeStyle = sel ? '#bfffbf' : '#2a4a2a'; ctx.strokeRect(bx, by, 64, 26);
    ctx.fillStyle = sel ? '#04140a' : '#9fdf9f';
    ctx.font = '11px "Courier New"'; ctx.textAlign='center';
    ctx.fillText(r.cam, bx+32, by+17);
    r._bx = bx; r._by = by; // хитбоксы
  }
}

function drawStatic(alpha){
  if(alpha<=0) return;
  ctx.save(); ctx.globalAlpha = Math.min(1,alpha);
  for(let i=0;i<420;i++){
    const v = Math.random()*255|0;
    ctx.fillStyle = `rgb(${v},${v},${v})`;
    ctx.fillRect(Math.random()*W, Math.random()*H, Math.random()*22+2, 1.6);
  }
  ctx.restore();
}

/* ============================ HUD ============================ */
function gameHour(){ return Math.floor(G.time/HOUR_LEN); }
function hourLabel(){ const h = gameHour(); return (h===0?'12':String(h)) + ' ЧАС НОЧИ'; }

function drawHUD(){
  ctx.textAlign='left'; ctx.font='20px "Courier New"';
  // энергия
  ctx.fillStyle = G.power<20 ? (frame%20<10?'#ff5050':'#fff') : '#fff';
  ctx.fillText('Энергия: ' + Math.ceil(G.power) + '%', 24, H-58);
  ctx.fillStyle = '#fff'; ctx.font='16px "Courier New"';
  ctx.fillText('Расход:', 24, H-30);
  for(let i=0;i<G.usage;i++){
    ctx.fillStyle = ['#3adb5a','#3adb5a','#e8d24a','#ff5050','#ff5050'][i]||'#f00';
    ctx.fillRect(105+i*18, H-44, 14, 18);
  }
  // время / ночь
  ctx.textAlign='right'; ctx.font='22px "Courier New"'; ctx.fillStyle='#fff';
  ctx.fillText(hourLabel(), W-24, 40);
  ctx.font='16px "Courier New"'; ctx.fillStyle='#aaa';
  ctx.fillText('Ночь ' + G.night, W-24, 64);

  if(G.msgT>0){
    ctx.textAlign='center'; ctx.fillStyle='#ffb0b0'; ctx.font='18px "Courier New"';

  // кнопка камеры
  if(!G.powerOut){
    const hov = camBtnHover();

    ctx.strokeStyle = '#5a6aaa'; ctx.strokeRect(W/2-160, H-46, 320, 38);
    ctx.fillStyle = '#cfd6ff'; ctx.font='17px "Courier New"'; ctx.textAlign='center';
    ctx.fillText(G.camUp ? '▼ ОПУСТИТЬ КАМЕРУ ▼' : '▲ ПОДНЯТЬ КАМЕРУ ▲', W/2, H-21);
  }
}
function camBtnHover(){
  return mouse.x>W/2-160 && mouse.x<W/2+160 && mouse.y>H-46 && mouse.y<H-8;
}

function menuButtons(){
  const btns = [];

  }

function drawWin(){
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#fff'; ctx.textAlign='center';
  ctx.font='bold 72px "Courier New"';
  ctx.fillText('6:00', W/2, 200);
  ctx.font='26px "Courier New"';
  ctx.fillText('УТРА', W/2, 250);
  ctx.font='20px "Courier New"'; ctx.fillStyle='#9f9';
  ctx.fillText('Ночь ' + G.night + ' пройдена!', W/2, 320);
  ctx.fillStyle='#888'; ctx.font='17px "Courier New"';
  ctx.fillText('Нажмите, чтобы продолжить', W/2, 400);
}
function drawBeat6(){
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#ffd700'; ctx.textAlign='center';
  ctx.font='bold 50px "Courier New"';
  ctx.fillText('ВСЕ НОЧИ ПРОЙДЕНЫ!', W/2, 200);
  ctx.font='24px "Courier New"'; ctx.fillStyle='#fff';
  ctx.fillText('Вы пережили неделю в пиццерии.', W/2, 270);
  ctx.fillText('ПРЕМИЯ: 120 ₽ ★', W/2, 320);
  ctx.fillStyle='#888'; ctx.font='17px "Courier New"';
  ctx.fillText('Нажмите, чтобы вернуться в меню', W/2, 400);
}
function drawGameOver(){
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  drawStatic(.35);
  ctx.fillStyle = '#ff3030'; ctx.textAlign='center';
  ctx.font='bold 56px "Courier New"';
  ctx.fillText('ИГРА ОКОНЧЕНА', W/2, 230);
  ctx.fillStyle='#aaa'; ctx.font='18px "Courier New"';
  ctx.fillText('Вас засунули в костюм…', W/2, 290);
  ctx.fillStyle='#888'; ctx.font='17px "Courier New"';
  ctx.fillText('Нажмите, чтобы попробовать снова', W/2, 380);
}

/* ============================ ЦИКЛ ============================ */
function loop(t){
  requestAnimationFrame(loop);
  const dt = Math.min(.05, (t-lastT)/1000 || .016);
  lastT = t; frame += dt*30;

  if(scene==='night'){
    updateNight(dt);
    if(G.killer){
      ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
      drawJumpscareFace(ctx, G.killer, G.jsTimer);
      drawStatic(.2);
      return;
    }
    if(scene!=='night'){ /* перешли в win */ }
    else if(G.camUp){ drawCamView(); drawHUD(); }
    else { drawOffice(); drawHUD(); }
  }
  else if(scene==='menu') drawMenu();
  else if(scene==='win') drawWin();
  else if(scene==='beat6') drawBeat6();
  else if(scene==='gameover') drawGameOver();
}
requestAnimationFrame(loop);

/* ============================ ВВОД ============================ */
function canvasPos(e){
  const r = cvs.getBoundingClientRect();
  return { x:(e.clientX-r.left)/r.width*W, y:(e.clientY-r.top)/r.height*H };
}
cvs.addEventListener('mousemove', e=>{ const p = canvasPos(e); mouse.x=p.x; mouse.y=p.y; });
cvs.addEventListener('mousedown', e=>{
  AU.init();
  const p = canvasPos(e); mouse.x=p.x; mouse.y=p.y;

  if(scene==='menu'){
    for(const b of menuButtons()){
      if(p.x>b.x&&p.x<b.x+b.w&&p.y>b.y&&p.y<b.y+b.h){
        if(b.reset && unlockedNight>1){
          // новая игра не сбрасывает прогресс, просто ночь 1
        }
        newNight(b.night); scene='night';
        AU.startAmbience(); AU.click();
        return;
      }
    }
    return;
  }
  if(scene==='win'){
    newNight(G.night+1); scene='night'; AU.startAmbience(); return;
  }
  if(scene==='beat6' || scene==='gameover'){
    scene='menu'; return;
  }
  if(scene!=='night' || G.killer || G.powerOut) return;

  // кнопка камеры
  if(camBtnHover()){
    G.camUp = !G.camUp; G.camStatic = 1; AU.blip();
    return;
  }
  if(G.camUp){
    // выбор камеры на карте
    for(const key of CAM_ORDER){
      const r = ROOMS[key];
      if(r._bx!==undefined && p.x>r._bx && p.x<r._bx+64 && p.y>r._by && p.y<r._by+26){
        if(G.cam!==key){ G.cam = key; G.camStatic = .6; AU.blip(); }
        return;
      }
    }
    return;
  }
  // кнопки дверей/света в координатах сцены
  const sx = p.x + G.panX;
  const hits = [
    {x:60+226,  y:200, act:()=>{G.doorL=!G.doorL; AU.doorSlam();}},
    {x:60+226,  y:268, act:()=>{G.lightL=!G.lightL; G.lightR=false; AU.click();}},
    {x:SCENE_W-260-66, y:200, act:()=>{G.doorR=!G.doorR; AU.doorSlam();}},
    {x:SCENE_W-260-66, y:268, act:()=>{G.lightR=!G.lightR; G.lightL=false; AU.click();}},
  ];
  for(const h of hits){
    if(sx>h.x-6 && sx<h.x+46 && p.y>h.y-10 && p.y<h.y+46){ h.act(); return; }
  }
});
// блокируем контекстное меню
cvs.addEventListener('contextmenu', e=>e.preventDefault());
</script>
